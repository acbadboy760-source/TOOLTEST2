name: Build ApocalypseNet APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create Flutter project in subfolder
        run: |
          set -e
          # create project in a subfolder to avoid overwriting repo root
          flutter create --platforms android --project-name apocalypse_net apocalypse_net

      - name: Ensure Android licenses accepted
        run: |
          set -e
          # accept android licenses (may prompt - piping yes handles it)
          yes | flutter doctor --android-licenses || true
          flutter doctor -v

      - name: Write minimal app files
        run: |
          set -e
          # Overwrite pubspec.yaml inside the generated project with required deps
          cat > apocalypse_net/pubspec.yaml << 'EOF'
name: apocalypse_net
description: "اینترنت آخرالزمان"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  animated_text_kit: ^4.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
EOF

          mkdir -p apocalypse_net/lib/mesh apocalypse_net/lib/widgets apocalypse_net/lib/screens

          # theme.dart
          cat > apocalypse_net/lib/theme.dart << 'DART'
import 'package:flutter/material.dart';
import 'package:google_fonts/google_fonts.dart';

class ApocalypseTheme {
  static const Color background = Color(0xFF0A0E14);
  static const Color neonGreen = Color(0xFF39FF14);
  static const Color neonBlue = Color(0xFF00F0FF);
  static const Color darkSurface = Color(0xFF1A1E24);
  static const Color textPrimary = Color(0xFFE0E0E0);
  static const Color textSecondary = Color(0xFF9E9E9E);

  static ThemeData get darkTheme => ThemeData(
        brightness: Brightness.dark,
        scaffoldBackgroundColor: background,
        primaryColor: neonGreen,
        appBarTheme: AppBarTheme(
          backgroundColor: darkSurface,
          titleTextStyle: GoogleFonts.orbitron(
              fontSize: 20, fontWeight: FontWeight.bold, color: neonGreen),
          iconTheme: const IconThemeData(color: neonGreen),
        ),
        textTheme: TextTheme(
          bodyLarge: GoogleFonts.robotoMono(color: textPrimary),
          bodyMedium: GoogleFonts.robotoMono(color: textSecondary),
        ),
        elevatedButtonTheme: ElevatedButtonThemeData(
          style: ElevatedButton.styleFrom(
            backgroundColor: neonGreen,
            foregroundColor: background,
            shape:
                RoundedRectangleBorder(borderRadius: BorderRadius.circular(12)),
          ),
        ),
      );
}
DART

          # mesh_manager.dart (safe on CI)
          cat > apocalypse_net/lib/mesh/mesh_manager.dart << 'DART'
import 'dart:async';
import 'package:flutter/services.dart';

class MeshManager {
  final List<Map<String, dynamic>> peers = [];
  final List<String> messages = [];
  void Function()? onPeersChanged;
  void Function()? onMessageReceived;

  static const EventChannel _peerChannel = EventChannel('apocalypse_net/peers');

  Future<void> init() async {
    try {
      _peerChannel.receiveBroadcastStream().listen((data) {
        if (data is List) {
          peers.clear();
          for (var p in data) {
            peers.add(Map<String, dynamic>.from(p));
          }
          onPeersChanged?.call();
        }
      });
    } catch (_) {
      // Platform channel not implemented on CI/emulator — ignore
    }
  }

  Future<void> sendText(String text) async {
    messages.add('من: $text');
    onMessageReceived?.call();
  }

  void dispose() {}
}
DART

          # minimal main.dart (uses theme + simple home)
          cat > apocalypse_net/lib/main.dart << 'DART'
import 'package:flutter/material.dart';
import 'package:apocalypse_net/theme.dart';
import 'package:apocalypse_net/mesh/mesh_manager.dart';
import 'package:apocalypse_net/screens/home_screen.dart';

void main() => runApp(const ApocalypseNetApp());

class ApocalypseNetApp extends StatelessWidget {
  const ApocalypseNetApp({super.key});
  @override
  Widget build(BuildContext context) {
    return MaterialApp(
      title: 'اینترنت آخرالزمان',
      debugShowCheckedModeBanner: false,
      theme: ApocalypseTheme.darkTheme,
      home: const SplashInit(),
    );
  }
}

class SplashInit extends StatefulWidget {
  const SplashInit({super.key});
  @override
  State<SplashInit> createState() => _SplashInitState();
}

class _SplashInitState extends State<SplashInit> {
  final MeshManager _meshManager = MeshManager();
  bool _initialized = false;

  @override
  void initState() {
    super.initState();
    _initMesh();
  }

  Future<void> _initMesh() async {
    await _meshManager.init();
    setState(() => _initialized = true);
  }

  @override
  Widget build(BuildContext context) {
    if (!_initialized) {
      return const Scaffold(
          body: Center(
              child:
                  CircularProgressIndicator(color: ApocalypseTheme.neonGreen)));
    }
    return HomeScreen(meshManager: _meshManager);
  }
}
DART

      - name: Get dependencies
        working-directory: apocalypse_net
        run: flutter pub get

      - name: Build APK
        working-directory: apocalypse_net
        run: flutter build apk --debug --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apocalypse-net
          path: apocalypse_net/build/app/outputs/flutter-apk/*.apk
